name: 🐕 TTS box watchdog

# Proactively checks, shortly before the daily digest runs, that the ai-tools
# LAN box is reachable. The digest's generate-one-language jobs run on a
# self-hosted runner on that box and talk to the local Qwen3-TTS; if the box is
# off/asleep at 05:00 UTC the run queues with no runner and fails.
#
# This runs on a GitHub-hosted runner so it still fires when the box is down.
# It probes the public TTS /health over the Cloudflare tunnel as a proxy for
# "box is up". NOTE: this is a proxy for box availability, not a direct check of
# the runner service (which has systemd Restart=always). A direct runner check
# would need a PAT with Administration:read; see repo notes.
on:
  schedule:
    - cron: '40 4 * * *'   # 20 min before the 05:00 UTC daily digest
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: tts-box-watchdog
  cancel-in-progress: false

jobs:
  check-box:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      HEALTH_URL: ${{ secrets.DD_TTS_URL }}
      TITLE: "🔴 audionews TTS box unreachable (pre-digest watchdog)"
    steps:
      - name: Probe TTS box health and alert
        run: |
          set -uo pipefail

          if [ -z "${HEALTH_URL:-}" ]; then
            echo "::error title=watchdog::DD_TTS_URL secret is empty"; exit 1
          fi
          URL="${HEALTH_URL%/}/health"
          echo "Probing $URL (up to 5 attempts)..."

          HEALTHY=0
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -m 15 -o /tmp/health.out -w '%{http_code}' "$URL" || echo 000)
            echo "  attempt $i -> HTTP $CODE"
            if [ "$CODE" = "200" ] && grep -q '"status"' /tmp/health.out 2>/dev/null; then
              HEALTHY=1; break
            fi
            [ "$i" -lt 5 ] && sleep 15
          done

          EXISTING=$(gh issue list --repo "$REPO" --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number // ""')

          if [ "$HEALTHY" = "1" ]; then
            echo "✅ TTS box healthy: $(cat /tmp/health.out | head -c 160)"
            if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --repo "$REPO" \
                --body "✅ TTS box reachable again ($(date -u '+%Y-%m-%d %H:%M UTC')). Auto-closing."
              gh issue close "$EXISTING" --repo "$REPO"
            fi
            exit 0
          fi

          echo "::warning title=watchdog::TTS box did not respond healthy; 05:00 UTC digest is at risk."
          BODY=$(printf '%s\n' \
            "The ai-tools LAN box appears **unreachable** via the TTS tunnel as of $(date -u '+%Y-%m-%d %H:%M UTC') (5 attempts, last probe of \`$URL\` failed)." \
            "" \
            "The daily digest's \`generate-one-language\` jobs run on the self-hosted runner on that box and use the local Qwen3-TTS. If the box is down, the **05:00 UTC** run will queue with no runner and fail." \
            "" \
            "**To fix:** power on the ai-tools box and confirm services:" \
            '```' \
            "ssh root@192.168.68.55 'systemctl status actions-runner-audionews.service cloudflared qwen-tts'" \
            "ssh root@192.168.68.55 'systemctl restart actions-runner-audionews.service'" \
            '```' \
            "" \
            "_Opened automatically by the TTS box watchdog; auto-closes when the box is reachable again. This probes the tunnel as a proxy for box availability, not the runner service directly._")

          if [ -n "$EXISTING" ]; then
            echo "Watchdog issue #$EXISTING already open; adding a note."
            gh issue comment "$EXISTING" --repo "$REPO" --body "Still unreachable at $(date -u '+%Y-%m-%d %H:%M UTC')."
          else
            gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY"
          fi
          exit 1
